<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background with Pokémon theme gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cce0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="pixelate">
      <feFlood x="0" y="0" width="1" height="1" flood-color="#333" />
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="200" height="200" fill="url(#bgGradient)" stroke="#666" stroke-width="4"/>
  
  <!-- Pokéball-style design -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#d32f2f" stroke-width="3"/>
  <circle cx="100" cy="100" r="45" fill="none" stroke="#d32f2f" stroke-width="2"/>
  <line x1="40" y1="100" x2="160" y2="100" stroke="#333" stroke-width="3"/>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="12" fill="#333"/>
  <circle cx="100" cy="100" r="8" fill="#fff"/>
  
  <!-- Question mark as fallback indicator -->
  <text x="100" y="165" font-family="Press Start 2P, monospace" font-size="32" font-weight="bold" text-anchor="middle" fill="#666">?</text>
  
  <!-- Decorative pixel pattern corners -->
  <rect x="10" y="10" width="8" height="8" fill="#d32f2f" opacity="0.6"/>
  <rect x="182" y="10" width="8" height="8" fill="#d32f2f" opacity="0.6"/>
  <rect x="10" y="182" width="8" height="8" fill="#d32f2f" opacity="0.6"/>
  <rect x="182" y="182" width="8" height="8" fill="#d32f2f" opacity="0.6"/>
</svg>